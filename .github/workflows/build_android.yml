name: 🤖 Build & Deploy Android

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      flavor:
        description: 'Build flavor'
        required: true
        default: 'production'
        type: choice
        options: [development, staging, production]
      build_type:
        description: 'Build type'
        required: true
        default: 'apk'
        type: choice
        options: [apk, appbundle]

env:
  FLUTTER_VERSION: '3.19.0'
  JAVA_VERSION: '17'

jobs:
  # ─── Code Quality ──────────────────────────────────────────────────────────
  analyze:
    name: 🔍 Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: coverage/lcov.info
        continue-on-error: true

  # ─── Android Build ─────────────────────────────────────────────────────────
  build_android:
    name: 🤖 Build Android (${{ github.event.inputs.flavor || 'production' }})
    runs-on: ubuntu-latest
    needs: analyze
    if: github.event_name != 'pull_request'

    strategy:
      matrix:
        flavor: ${{ fromJSON(github.event_name == 'workflow_dispatch' && format('["{0}"]', github.event.inputs.flavor) || '["production"]') }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # ── Restore Gradle cache ──
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── Create .env from secrets ──
      - name: Create .env file
        run: |
          cat > .env << EOF
          FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID_ANDROID=${{ secrets.FIREBASE_APP_ID_ANDROID }}
          FIREBASE_APP_ID_IOS=${{ secrets.FIREBASE_APP_ID_IOS }}
          FIREBASE_APP_ID_WEB=${{ secrets.FIREBASE_APP_ID_WEB }}
          GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}
          EOF

      # ── Inject google-services.json ──
      - name: Inject google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      # ── Decode & setup keystore ──
      - name: Setup keystore
        run: |
          echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 --decode > android/app/release.jks
          cat > android/key.properties << EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.jks
          EOF

      - name: Get Flutter dependencies
        run: flutter pub get

      # ── Generate code (Riverpod, Hive, etc.) ──
      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      # ── Compute version ──
      - name: Set version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION_NAME="${VERSION#v}"
          else
            VERSION_NAME="1.0.0"
          fi
          BUILD_NUMBER=${{ github.run_number }}
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Building $VERSION_NAME+$BUILD_NUMBER"

      # ── Build APK ──
      - name: Build APK
        if: github.event.inputs.build_type != 'appbundle'
        run: |
          flutter build apk \
            --release \
            --flavor ${{ matrix.flavor }} \
            --target lib/main.dart \
            --build-name=${{ steps.version.outputs.VERSION_NAME }} \
            --build-number=${{ steps.version.outputs.BUILD_NUMBER }} \
            --dart-define=FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }} \
            --dart-define=FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }} \
            --dart-define=FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }} \
            --dart-define=FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }} \
            --dart-define=FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }} \
            --dart-define=FIREBASE_APP_ID_ANDROID=${{ secrets.FIREBASE_APP_ID_ANDROID }} \
            --dart-define=GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}

      # ── Build App Bundle ──
      - name: Build App Bundle
        if: github.event.inputs.build_type == 'appbundle' || startsWith(github.ref, 'refs/tags/')
        run: |
          flutter build appbundle \
            --release \
            --flavor ${{ matrix.flavor }} \
            --target lib/main.dart \
            --build-name=${{ steps.version.outputs.VERSION_NAME }} \
            --build-number=${{ steps.version.outputs.BUILD_NUMBER }} \
            --dart-define=FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }} \
            --dart-define=FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }} \
            --dart-define=FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }} \
            --dart-define=FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }} \
            --dart-define=FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }} \
            --dart-define=FIREBASE_APP_ID_ANDROID=${{ secrets.FIREBASE_APP_ID_ANDROID }} \
            --dart-define=GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}

      # ── Rename artifacts ──
      - name: Rename artifacts
        run: |
          FLAVOR=${{ matrix.flavor }}
          VER=${{ steps.version.outputs.VERSION_NAME }}
          BUILD=${{ steps.version.outputs.BUILD_NUMBER }}
          mkdir -p dist
          if [ -f "build/app/outputs/flutter-apk/app-${FLAVOR}-release.apk" ]; then
            cp "build/app/outputs/flutter-apk/app-${FLAVOR}-release.apk" \
               "dist/chatloc-${FLAVOR}-${VER}+${BUILD}.apk"
          fi
          if [ -f "build/app/outputs/bundle/${FLAVOR}Release/app-${FLAVOR}-release.aab" ]; then
            cp "build/app/outputs/bundle/${FLAVOR}Release/app-${FLAVOR}-release.aab" \
               "dist/chatloc-${FLAVOR}-${VER}+${BUILD}.aab"
          fi

      # ── Upload artifacts ──
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.flavor }}-${{ steps.version.outputs.VERSION_NAME }}
          path: dist/
          retention-days: 30

      # ── Deploy to Firebase App Distribution (non-prod) ──
      - name: Deploy to Firebase App Distribution
        if: matrix.flavor != 'production'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: dist/chatloc-${{ matrix.flavor }}-${{ steps.version.outputs.VERSION_NAME }}+${{ steps.version.outputs.BUILD_NUMBER }}.apk
          releaseNotes: |
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Build: ${{ steps.version.outputs.VERSION_NAME }}+${{ steps.version.outputs.BUILD_NUMBER }}

      # ── Upload to Play Store (tags only) ──
      - name: Upload to Google Play (Internal)
        if: startsWith(github.ref, 'refs/tags/') && matrix.flavor == 'production'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}
          packageName: com.yourcompany.chatloc
          releaseFiles: dist/*.aab
          track: internal
          status: completed
          whatsNewDirectory: distribution/whatsnew

      # ── Create GitHub Release ──
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && matrix.flavor == 'production'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Cleanup secrets ──
      - name: Cleanup secrets
        if: always()
        run: |
          rm -f .env
          rm -f android/app/release.jks
          rm -f android/key.properties
          rm -f android/app/google-services.json
